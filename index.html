<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bandon Command Center</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f0e1;}
.header{background:#1e3d1a;color:white;padding:18px;text-align:center;}
.nav{display:flex;background:white;border-bottom:2px solid #c9a84c;}
.nav button{flex:1;padding:12px;border:none;background:none;font-weight:700;}
.nav button.active{border-bottom:3px solid #c9a84c;}
.page{display:none;padding:15px;}
.page.active{display:block;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}
.todo label{display:block;padding:6px 0;}
.small{color:#666;font-size:12px;}
.highlight{font-weight:700;color:#1e3d1a;}
</style>

</head>
<body>

<div class="header">
<h2>BANDON BANDITS</h2>
<p>May 1–5</p>
</div>

<div class="nav">
<button class="active" onclick="showPage('home')">Home</button>
<button onclick="showPage('travel')">Travel</button>
<button onclick="showPage('daily')">Daily</button>
<button onclick="showPage('todo')">Packing</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h3>Mission</h3>
<p>36 holes a day. Walk everything. Adapt or die.</p>
</div>
</div>

<!-- TRAVEL -->
<div id="travel" class="page">
<div class="card">
<h3>Flights</h3>
<p>UA 2177 → UA 4689</p>
<p>Return UA 5938 → UA 1375</p>
<a href="https://www.united.com" target="_blank">Open United</a>
</div>

<div class="card">
<h3>Parking</h3>
<p>Fast Park Austin (88991683)</p>
</div>
</div>

<!-- DAILY -->
<div id="daily" class="page">

<div class="card">
<button onclick="loadDay(1)">May 1</button>
<button onclick="loadDay(2)">May 2</button>
<button onclick="loadDay(3)">May 3</button>
<button onclick="loadDay(4)">May 4</button>
<button onclick="loadDay(5)">May 5</button>
</div>

<div id="weatherBox" class="card">Loading weather...</div>
<div id="dayContent"></div>

</div>

<!-- PACKING -->
<div id="todo" class="page">

<div class="card">
<h3>Pack</h3>
<div class="todo">
<label><input type="checkbox"> Rain jacket</label>
<label><input type="checkbox"> Rain pants</label>
<label><input type="checkbox"> Both golf shoes</label>
<label><input type="checkbox"> Rain gloves</label>
<label><input type="checkbox"> Normal gloves</label>
<label><input type="checkbox"> Base layer</label>
<label><input type="checkbox"> Beanie</label>
<label><input type="checkbox"> Socks</label>
<label><input type="checkbox"> Towels</label>
<label><input type="checkbox"> Theragun</label>
<label><input type="checkbox"> Tylenol</label>
<label><input type="checkbox"> Headphones</label>
</div>
</div>

<div class="card">
<h3>Buy First</h3>
<div class="todo">
<label><input type="checkbox"> Water bottle</label>
<label><input type="checkbox"> Energy waffles</label>
<label><input type="checkbox"> Protein shakes</label>
<label><input type="checkbox"> Hot hands</label>
<label><input type="checkbox"> Gloves</label>
<label><input type="checkbox"> Balls</label>
</div>
</div>

</div>

<script>
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
}

// SAVE CHECKLIST
document.querySelectorAll('.todo input').forEach((box,i)=>{
box.checked = localStorage.getItem('cb'+i)==='true';
box.onchange = ()=>localStorage.setItem('cb'+i, box.checked);
});

// DAILY PLAN
const plans={
1:"Travel + Preserve",
2:"Old Mac + Pac Dunes",
3:"Sheep Ranch + Bandon",
4:"Trails + Pac Dunes",
5:"Shorty's + Travel"
};

// WEATHER (HOURLY)
async function loadWeather(){
let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=43.5&longitude=-124.4&hourly=temperature_2m,precipitation_probability,windspeed_10m&timezone=auto");
let data = await res.json();

let nowHour = new Date().getHours();

// split AM / PM
let amTemp = data.hourly.temperature_2m[nowHour];
let pmTemp = data.hourly.temperature_2m[nowHour+6];

let amWind = data.hourly.windspeed_10m[nowHour];
let pmWind = data.hourly.windspeed_10m[nowHour+6];

let rain = data.hourly.precipitation_probability[nowHour];

window.weather={amTemp,pmTemp,amWind,pmWind,rain};

document.getElementById("weatherBox").innerHTML = `
<h3>Today Weather</h3>
<p>AM: ${amTemp}° | Wind ${amWind}mph</p>
<p>PM: ${pmTemp}° | Wind ${pmWind}mph</p>
<p>Rain: ${rain}%</p>
<p class="small">Wind > temp at Bandon</p>
`;
}

// SMART GEAR ENGINE
function buildGear(){

let w=window.weather||{};
let gear=[
"Electrolyte per round",
"Clif bar per round",
"Protein shake after round"
];

// WIND (biggest factor)
if(w.amWind>15 || w.pmWind>15){
gear.push("Beanie / wind layer");
gear.push("Lip balm (wind burn is real)");
}

// RAIN
if(w.rain>25){
gear.push("Rain gloves");
gear.push("Extra socks");
gear.push("Rotate towels");
}

// COLD
if(w.amTemp<55 || w.pmTemp<55){
gear.push("Base layer");
}

// ALWAYS
gear.push("Rain gear (always carry)");

return gear;
}

function loadDay(day){

let gear=buildGear();

document.getElementById("dayContent").innerHTML=`
<div class="card">
<h3>${plans[day]}</h3>

<p class="highlight">Game Plan:</p>
${gear.map(g=>"<p>• "+g+"</p>").join("")}

<a href="https://www.ghin.com" target="_blank">Post Score</a>
</div>
`;
}

// AUTO LOAD TODAY
function autoLoad(){
let today=new Date().getDate();
if(today>=1 && today<=5){
loadDay(today);
}
}

loadWeather();
autoLoad();
</script>

</body>
</html>
